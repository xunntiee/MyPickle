services:
  mypick-backend:
    build:
      context: ./backend
    environment:
      PORT: ${PORT:-3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://mypick.trevo.studio,http://localhost:5173}
      TREVO_API_URL: ${TREVO_API_URL:-https://api.trevo.studio/api/external}
      TREVO_API_KEY: ${TREVO_API_KEY:-}
      TREVO_ORIGIN: ${TREVO_ORIGIN:-https://mypick.trevo.studio}
      TREVO_CATALOG_FETCH_LIMIT: ${TREVO_CATALOG_FETCH_LIMIT:-100}
    restart: unless-stopped
    networks:
      - default
      - edge

  mypick-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    depends_on:
      mypick-backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - edge

networks:
  edge:
    name: trevo-edge
    external: true
